<!doctype html>
<html lang="es">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Contacto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="navbar-container"></div>
    <h1 class="text-center py-4 fw-bold">Contáctanos</h1>

    <div class="container my-4">
        <div class="row justify-content-center g-4">

            <section class="col-12 col-md-6">
                <form action="#" method="POST" class="needs-validation" novalidate>
                    <div class="formulario p-4 border rounded bg-light shadow-sm">
                        <h2 class="mb-4">Formulario de contacto</h2>

                        <div class="row g-3 mb-3">
                            <div class="col-12 col-sm-6">
                                <label for="nombre" class="form-label">Nombre:<span class="text-danger">*</span></label>
                                <input type="text" id="nombre" name="nombre" class="form-control" placeholder="Ingresa tu nombre" required>
                            </div>
                            <div class="col-12 col-sm-6">
                                <label for="apellido" class="form-label">Apellido:<span class="text-danger">*</span></label>
                                <input type="text" id="apellido" name="apellido" class="form-control" placeholder="Ingresa tu apellido" required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="correo" class="form-label">Correo Electrónico:<span class="text-danger">*</span></label>
                            <input type="email" id="correo" name="correo" class="form-control" placeholder="example@mail.com" required>
                        </div>

                        <div class="mb-4">
                            <label for="mensaje" class="form-label">Mensaje:<span class="text-danger">*</span></label>
                            <textarea id="mensaje" name="mensaje" class="form-control" placeholder="Escribe tu mensaje aquí..." required></textarea>
                        </div>

                        <button type="submit" class="btn btn-primary w-100">Enviar</button>
                    </div> </form>
            </section>

            <section class="col-12 col-md-4">
                <div class="p-4 border rounded bg-light shadow-sm">
                    <h2 class="mb-4">Información de contacto</h2>
                    <ul class="list-unstyled">
                        <li class="mb-3">
                            <i class="bi bi-envelope-fill pe-2"></i>
                            <strong>Correo electrónico:</strong> info@empresa.com
                        </li>
                        <li>
                            <i class="bi bi-telephone-fill pe-2"></i>
                            <strong>Teléfono:</strong> +569 67363822
                        </li>
                    </ul>
                </div>
            </section>

        </div>
    </div>

    <div id="footer-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
    <script src="script.js"></script>

</body>

</html>
